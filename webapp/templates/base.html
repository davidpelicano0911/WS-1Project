{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Baseball Data Explorer{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'baseball/style.css' %}">
</head>
<body>
    <div class="site-shell">
        <div class="container">
            <nav class="navbar navbar-expand-lg site-nav rounded-pill px-3 px-md-4 py-3 mb-4">
                <div class="container-fluid px-0">
                    <a class="navbar-brand d-flex align-items-center gap-3 text-white m-0" href="{% url 'home' %}">
                        <span class="brand-mark">
                            <i class="bi bi-baseball"></i>
                        </span>
                        <span class="site-brand">Baseball Data Explorer</span>
                    </a>
                </div>
            </nav>

            {% block content %}{% endblock %}

            <footer class="site-footer text-center mt-5 pt-3">
                <small>Practical Assignment 1 · Semantic Web Baseball Explorer</small>
            </footer>
        </div>
    </div>
</body>
</html>
