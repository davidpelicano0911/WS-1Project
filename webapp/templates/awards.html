<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hall of Fame - Awards</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #eef2f3, #dfe9f3);
            min-height: 100vh;
        }

        .card {
            border: none;
            border-radius: 20px;
        }

        .table thead {
            border-radius: 10px;
        }

        .badge {
            font-size: 0.9rem;
            padding: 8px 12px;
        }

        .header-title {
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container mt-5">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="header-title">
            <i class="bi bi-trophy-fill text-warning"></i> Hall of Fame Awards
        </h1>
        <a href="{% url 'home' %}" class="btn btn-outline-dark rounded-pill">
            <i class="bi bi-arrow-left"></i> Back
        </a>
    </div>

    <!-- Table Card -->
    <div class="card shadow-lg">
        <div class="card-body">

            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-dark text-center">
                        <tr>
                            <th>Player</th>
                            <th>Award</th>
                            <th>Year</th>
                        </tr>
                    </thead>
                    <tbody class="text-center">

                        {% for a in awards %}
                        <tr>
                            <td><strong>{{ a.name.value }}</strong></td>
                            <td>{{ a.award.value }}</td>
                            <td>
                                <span class="badge bg-primary">
                                    {{ a.year.value }}
                                </span>
                            </td>
                        </tr>
                        {% empty %}
                        <tr>
                            <td colspan="3" class="text-muted py-4">
                                <i class="bi bi-database-exclamation"></i><br>
                                No data available yet. Check GraphDB!
                            </td>
                        </tr>
                        {% endfor %}

                    </tbody>
                </table>
            </div>

        </div>
    </div>

    <!-- Footer -->
    <footer class="text-center mt-5 text-muted">
        <small>Semantic Web Project</small>
    </footer>

</div>

</body>
</html>
